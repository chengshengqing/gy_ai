timeline-view:
  rules:
    max-badges: 10
    primary-statuses:
      - active
      - acute_exacerbation
      - worsening
      - improving
    key-day-source-badges:
      - 入院日
      - 手术日
      - 会诊
      - 拟出院
    high-badges:
      - 手术日
      - 高风险
    high-post-op-badge-prefixes:
      - 术后第1天
    medium-badges:
      - 会诊
    source-surgery-patterns:
      - 手术记录
    source-consult-patterns:
      - 会诊记录|请会诊记录
    source-discharge-patterns:
      - 出院记录
    source-admission-patterns:
      - 首次病程记录|入院记录
    admission-summary-patterns:
      - 入院|收住|初诊
    discharge-summary-patterns:
      - 拟办理出院|拟出院|出院
    hide-problem-type-patterns:
      - value: differential
        label: 鉴别诊断
    hide-problem-name-patterns:
      - 鉴别诊断
    important-unconfirmed-patterns:
      - value: suspected
        label: 疑似
      - value: possible
        label: 可能
      - value: workup_needed
        label: 待排/待查
      - value: risk_only
        label: 风险提示
    primary-problem-badge-rules:
      - pattern: 贫血
        badge: 贫血
      - pattern: 感染
        badge: 感染
      - pattern: 血栓|抗凝
        badge: 血栓风险
      - pattern: 疼痛
        badge: 疼痛
