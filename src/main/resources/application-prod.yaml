spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${YG_AI_DB_URL}
    username: ${YG_AI_DB_USERNAME}
    password: ${YG_AI_DB_PASSWORD}
    hikari:
      maximum-pool-size: ${YG_AI_DB_MAX_POOL_SIZE:20}
      minimum-idle: ${YG_AI_DB_MIN_IDLE:10}
  data:
    redis:
      host: ${YG_AI_REDIS_HOST}
      port: ${YG_AI_REDIS_PORT:6379}
      database: ${YG_AI_REDIS_DB:0}
#      password: ${YG_AI_REDIS_PASSWORD}
  ai:
    openai:
      api-key: ${YG_AI_OPENAI_API_KEY}
      base-url: ${YG_AI_OPENAI_BASE_URL}
      chat:
        options:
          model: ${YG_AI_OPENAI_MODEL}

infection:
  monitor:
    scan-limit: ${YG_AI_MONITOR_SCAN_LIMIT:500}
    batch-size: ${YG_AI_MONITOR_BATCH_SIZE:100}
    worker-threads: ${YG_AI_MONITOR_WORKER_THREADS:8}
    max-attempts: ${YG_AI_MONITOR_MAX_ATTEMPTS:5}
    retry-delay-seconds: ${YG_AI_MONITOR_RETRY_DELAY_SECONDS:300}
    recent-admission-days: ${YG_AI_MONITOR_RECENT_ADMISSION_DAYS:30}
    debug-mode: ${YG_AI_MONITOR_DEBUG_MODE:false}
    debug-reqnos: ${YG_AI_MONITOR_DEBUG_REQNOS:}
  format:
    batch-size: ${YG_AI_FORMAT_BATCH_SIZE:100}
    worker-threads: ${YG_AI_FORMAT_WORKER_THREADS:8}
    max-attempts: ${YG_AI_FORMAT_MAX_ATTEMPTS:5}
    retry-delay-seconds: ${YG_AI_FORMAT_RETRY_DELAY_SECONDS:300}

logging:
  level:
    root: ${YG_AI_ROOT_LOG_LEVEL:info}
    com.zzhy.yg_ai: ${YG_AI_APP_LOG_LEVEL:info}
