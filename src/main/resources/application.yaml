server:
  port: ${YG_AI_SERVER_PORT:8090}

spring:
  application:
    name: ${YG_AI_APP_NAME:yg_ai}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    url: ${YG_AI_DB_URL:jdbc:sqlserver://127.0.0.1:1433;databaseName=yg_ai;encrypt=true;trustServerCertificate=true;}
    username: ${YG_AI_DB_USERNAME:sa}
    password: ${YG_AI_DB_PASSWORD:Abcd@1234}
    hikari:
      connection-test-query: SELECT 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: ${YG_AI_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${YG_AI_DB_MIN_IDLE:5}
      auto-commit: true
      pool-name: SqlServerHikariPool
      transaction-isolation: null
  task:
    scheduling:
      pool:
        size: ${YG_AI_TASK_POOL_SIZE:5}
      thread-name-prefix: ${YG_AI_TASK_THREAD_PREFIX:scheduled-task-}
  data:
    redis:
      host: ${YG_AI_REDIS_HOST:127.0.0.1}
      port: ${YG_AI_REDIS_PORT:6379}
      database: ${YG_AI_REDIS_DB:0}
#      password: ${YG_AI_REDIS_PASSWORD:}
  ai:
    openai:
      api-key: ${YG_AI_OPENAI_API_KEY:EMPTY}
      base-url: ${YG_AI_OPENAI_BASE_URL:http://192.168.0.205:6001}
      client:
        connect-timeout: ${YG_AI_OPENAI_CONNECT_TIMEOUT:60s}
        read-timeout: ${YG_AI_OPENAI_READ_TIMEOUT:60s}
      chat:
        options:
          model: ${YG_AI_OPENAI_MODEL:Qwen3.5-27B-FP8}
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml

infection:
  pipeline:
    shared-threads: ${YG_AI_PIPELINE_SHARED_THREADS:16}
    model-permits: ${YG_AI_PIPELINE_MODEL_PERMITS:12}
    normalize-window-start-hours: ${YG_AI_PIPELINE_NORMALIZE_WINDOW_START_HOURS:0,12}
    normalize-window-duration-hours: ${YG_AI_PIPELINE_NORMALIZE_WINDOW_DURATION_HOURS:4}
  warning:
    fixed-delay: ${YG_AI_WARNING_FIXED_DELAY:60000}
    case-fixed-delay: ${YG_AI_WARNING_CASE_FIXED_DELAY:60000}
  monitor:
    fixed-delay: ${YG_AI_MONITOR_FIXED_DELAY:60000}
    scan-limit: ${YG_AI_MONITOR_SCAN_LIMIT:200}
    max-attempts: ${YG_AI_MONITOR_MAX_ATTEMPTS:5}
    retry-delay-seconds: ${YG_AI_MONITOR_RETRY_DELAY_SECONDS:300}
    running-timeout-seconds: ${YG_AI_MONITOR_RUNNING_TIMEOUT_SECONDS:1800}
    recent-admission-days: ${YG_AI_MONITOR_RECENT_ADMISSION_DAYS:30}
    summary-window-days: ${YG_AI_MONITOR_SUMMARY_WINDOW_DAYS:7}
    debug-mode: ${YG_AI_MONITOR_DEBUG_MODE:false}
    debug-reqnos: ${YG_AI_MONITOR_DEBUG_REQNOS:}
  format:
    fixed-delay: ${YG_AI_FORMAT_FIXED_DELAY:30000}
    max-attempts: ${YG_AI_FORMAT_MAX_ATTEMPTS:5}
    retry-delay-seconds: ${YG_AI_FORMAT_RETRY_DELAY_SECONDS:300}
    running-timeout-seconds: ${YG_AI_FORMAT_RUNNING_TIMEOUT_SECONDS:1800}
  dashboard:
    enabled: ${YG_AI_MONITOR_DASHBOARD_ENABLED:true}
    snapshot-fixed-delay-ms: ${YG_AI_MONITOR_DASHBOARD_SNAPSHOT_FIXED_DELAY_MS:30000}
    bucket-ttl-hours: ${YG_AI_MONITOR_DASHBOARD_BUCKET_TTL_HOURS:30}
    llm-slow-threshold-ms: ${YG_AI_MONITOR_DASHBOARD_LLM_SLOW_THRESHOLD_MS:5000}

logging:
  level:
    root: ${YG_AI_ROOT_LOG_LEVEL:info}
    com.zzhy.yg_ai: ${YG_AI_APP_LOG_LEVEL:debug}
    org.springframework.ai.chat.client.advisor: ${YG_AI_CHAT_ADVISOR_LOG_LEVEL:debug}
