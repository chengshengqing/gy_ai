# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml

# app-level OpenAI client timeouts
app:
  agentscope:
    medical-struct:
      api-key: ${spring.ai.openai.api-key}
      base-url: ${spring.ai.openai.base-url}
      model-name: ${spring.ai.openai.chat.options.model}
      classify-batch-size: 1
      structured-batch-size: 10
      max-retries: 3
    data-handler:
      enabled: false
      batch-size: 20
      similarity-threshold: 0.9
      dry-run: true
      max-iters: 10
      max-retries: 3
      session-key-prefix: "agentscope:data-handler:session:"
      lock-key-prefix: "agentscope:data-handler:lock:"
      lock-ttl-seconds: 120
      scheduler:
        fixed-delay-ms: 30000
  ai:
    openai:
      connect-timeout: 10s
      read-timeout: 180s
      response-timeout: 180s

logging:
  level:
    org.springframework.ai.chat.client.advisor: debug
