#    url: jdbc:sqlserver://192.168.0.112:1433;databaseName=hicisdata_crb_xtsy_test;encrypt=false;trustServerCertificate=true;sslProtocol=TLSv1
    url: jdbc:sqlserver://192.168.0.112\SREVER2012;databaseName=hicisdata_yg_backup_2026_03_12;encrypt=true;trustServerCertificate=true;
    username: sa
    password: Abcd@1234
    hikari:
      # 核心配置：解决连接关闭问题
      connection-test-query: SELECT 1  # 显式指定测试语句（SQL Server 必需）
      connection-timeout: 30000       # 连接超时时间（ms）
      idle-timeout: 600000            # 空闲连接超时时间
      max-lifetime: 1800000           # 连接最大存活时间
      maximum-pool-size: 10           # 最大连接数（适配 SQL Server 2010 性能）
      minimum-idle: 5                 # 最小空闲连接数
      auto-commit: true               # 自动提交
      pool-name: SqlServerHikariPool
      # 关键：禁用连接隔离级别自动设置（解决 setTransactionIsolation 导致的连接关闭）
      transaction-isolation: null
  # 定时任务配置
  task:
    scheduling:
      pool:
        size: 5  # 定时任务线程池大小
      thread-name-prefix: scheduled-task-  # 线程名称前缀
  data:
    redis:
      # 业务侧 Redis（spring-boot-starter-data-redis）
      host: 127.0.0.1
      port: 6379
      database: 0
